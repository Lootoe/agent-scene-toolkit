<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilo Playground</title>
  <link rel="stylesheet" href="/playground/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Left: Config -->
    <aside class="panel">
      <div class="panel-section">
        <div class="section-label">STATUS</div>
        <div class="status-row"><span class="status-dot" id="statusDot"></span><span id="statusText">checking...</span></div>
        <div class="meta-text" id="configInfo"></div>
      </div>
      <div class="panel-section">
        <div class="section-label">SESSION <button class="btn-icon" id="newThread" title="New session">+</button></div>
        <input class="input-field" id="thread" readonly />
      </div>
      <div class="panel-section">
        <div class="section-label">AGENT</div>
        <select class="input-field" id="agents"></select>
      </div>
      <div class="panel-section">
        <div class="section-label">SCENE</div>
        <select class="input-field" id="scenes"></select>
      </div>
      <div class="panel-section">
        <div class="section-label">CONTEXT</div>
        <textarea class="input-field ctx-editor" id="sceneCtx" placeholder='{"env":"local"}'></textarea>
      </div>
    </aside>

    <!-- Center: Chat -->
    <main class="chat-area">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <textarea class="chat-input" id="message" placeholder="Send a message... Enter to send" rows="1"></textarea>
        <button class="btn-send" id="send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 8L2 14V9L8 8L2 7V2L14 8Z" fill="currentColor"/></svg>
        </button>
      </div>
    </main>

    <!-- Right: Event Log -->
    <aside class="panel log-panel">
      <div class="log-header">
        <span class="section-label">EVENT LOG</span>
        <button class="btn-text" id="clearLog">Clear</button>
      </div>
      <div class="filter-bar" id="filterBar"></div>
      <div class="events" id="events"></div>
    </aside>
  </div>
  <script src="/playground/main.js"></script>
</body>
</html>
