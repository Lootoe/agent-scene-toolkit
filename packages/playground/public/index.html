<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilo Playground</title>
  <style>
    body{margin:0;background:#0f1115;color:#e6e7eb;font:14px/1.5 Inter,system-ui}
    #app{display:grid;grid-template-columns:280px 1fr 360px;height:100vh}
    .panel{border-right:1px solid #242833;padding:12px;overflow:auto}.chat{display:flex;flex-direction:column}
    .log{border-left:1px solid #242833;padding:12px;overflow:auto}.messages{flex:1;overflow:auto;padding:16px}
    .input{display:flex;gap:8px;padding:12px;border-top:1px solid #242833}
    textarea,input,select,button{background:#171a21;color:#e6e7eb;border:1px solid #2a3040;border-radius:8px;padding:8px}
    textarea{flex:1;min-height:44px;resize:vertical}button{cursor:pointer}.u,.a{margin:8px 0;padding:10px;border-radius:10px;max-width:70%}
    .u{margin-left:auto;background:#3b82f6;color:#fff}.a{background:#1a1f2b}.event{border:1px solid #2a3040;border-radius:8px;padding:8px;margin:8px 0}
    .small{font-size:12px;color:#9aa4b2}
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <h3>Config</h3><div id="status" class="small">checking...</div>
      <div id="baseURL" class="small"></div><div id="model" class="small"></div>
      <button id="pingLlm" style="margin:8px 0">连接测试</button>
      <div>Thread</div><input id="thread" /><button id="newThread">New</button>
      <div style="margin-top:8px">Agent</div><select id="agents"></select>
      <div style="margin-top:8px">Scene</div><select id="scenes"></select>
    </div>
    <div class="chat">
      <div id="messages" class="messages"></div>
      <div class="input"><textarea id="message" placeholder="输入消息，Enter发送"></textarea><button id="send">Send</button></div>
    </div>
    <div class="log"><h3>Event Log</h3><div id="events"></div></div>
  </div>
  <script src="/playground/main.js"></script>
</body>
</html>
